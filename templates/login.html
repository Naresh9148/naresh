<!DOCTYPE html>
<html>
<head>
    <title>ATM Login</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background: #334155;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ATM Login</h2>
        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="pin" type="password" placeholder="PIN" required>
            <button>Login</button>
        </form>
    </div>
</body>
</html>
